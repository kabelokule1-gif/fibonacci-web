<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Fibonacci Web</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0ede8;--dot:#d4cfc8;--white:#fdfcfa;--border:#e2ddd6;--border-s:#c8c2b8;
  --text:#1c1a16;--t2:#5a5448;--t3:#9a9488;
  --gold:#b8860b;--gold-bright:#d4a017;--gold-l:#fdf8ee;--gold-b:#e8d898;
  --navy:#1a2340;--navy-l:#eef0f6;--navy-b:#c0c8e0;
  --green:#2d6a4f;--green-l:#edf7f2;
  --amber:#c47d0a;--amber-l:#fef8e8;
  --purple:#5c3d8f;--purple-l:#f3f0f9;
  --sh-m:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --sh-l:0 8px 32px rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.05);
  --sh-gold:0 4px 20px rgba(184,134,11,.18);
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;color:var(--text);}
.topbar{height:52px;background:var(--navy);border-bottom:1px solid #2a3460;display:flex;align-items:center;padding:0 14px;gap:8px;z-index:300;flex-shrink:0;}
.brand{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1rem;display:flex;align-items:center;gap:7px;text-decoration:none;color:var(--gold-bright);}
.brand svg{width:24px;height:24px;}
.t-sep{width:1px;height:20px;background:#2a3460;}
.spacer{flex:1;}
.tb{padding:5px 10px;border-radius:6px;border:1px solid #2a3460;background:transparent;font-family:'DM Sans',sans-serif;font-size:.74rem;font-weight:500;color:#a8a8c0;cursor:pointer;white-space:nowrap;}
.tb:active{background:#2a3460;color:var(--gold-bright);}
.canvas-name{font-size:.76rem;color:#c0bcd0;padding:4px 6px;border:1px solid transparent;border-radius:5px;outline:none;font-family:'DM Sans',sans-serif;background:transparent;max-width:110px;}
.canvas-name:focus{border-color:var(--gold);background:#1e2848;color:var(--gold-bright);}
#cw{flex:1;position:relative;overflow:hidden;background-color:var(--bg);background-image:radial-gradient(circle,var(--dot) 1px,transparent 1px);background-size:24px 24px;}
#world{position:absolute;top:0;left:0;transform-origin:0 0;width:0;height:0;}
#esvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
.eline{stroke:var(--border-s);stroke-width:1.5;fill:none;pointer-events:stroke;}
.eline:hover{stroke:var(--gold);}
#tline{stroke:var(--gold);stroke-width:1.5;stroke-dasharray:5 4;fill:none;pointer-events:none;display:none;}
/* CENTER UI */
#center-ui{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);display:flex;flex-direction:column;align-items:center;gap:18px;z-index:200;pointer-events:none;width:90%;max-width:580px;}
#center-ui.hidden{display:none;}
.center-phi{font-family:'Cormorant Garamond',serif;font-size:2.4rem;color:var(--gold);opacity:.2;line-height:1;}
.center-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;opacity:.45;}
.sugs{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;pointer-events:all;}
.sug-pill{padding:7px 14px;background:var(--white);border:1px solid var(--border);border-radius:100px;font-size:.77rem;color:var(--t2);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);white-space:nowrap;}
.sug-pill:active{background:var(--gold-l);border-color:var(--gold-b);color:var(--gold);}
.prompt-bar{pointer-events:all;display:flex;align-items:center;background:var(--white);border:1.5px solid var(--border-s);border-radius:100px;padding:6px 6px 6px 18px;box-shadow:var(--sh-m);width:100%;}
.prompt-bar:focus-within{border-color:var(--gold);}
.prompt-bar input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--text);outline:none;min-width:0;}
.prompt-bar input::placeholder{color:var(--t3);}
.pb-send{width:36px;height:36px;border-radius:50%;background:var(--navy);border:none;cursor:pointer;color:var(--gold-bright);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.pb-send:active{background:var(--gold);color:var(--navy);}
/* CARDS */
.card{position:absolute;background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-m);cursor:default;user-select:none;min-width:240px;}
.card.sel{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-l),var(--sh-m);}
.card.csrc{border-color:var(--green);box-shadow:0 0 0 3px var(--green-l),var(--sh-m);}
.chandle{display:flex;align-items:center;gap:8px;padding:11px 13px 8px;border-radius:var(--r) var(--r) 0 0;touch-action:none;}
.cicon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.ctitle{font-size:.8rem;font-weight:600;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cacts{display:flex;gap:3px;}
.cact{width:26px;height:26px;border-radius:4px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:.8rem;display:flex;align-items:center;justify-content:center;}
.cact:active{background:var(--bg);color:var(--text);}
.card.chat{max-width:320px;}
.chat-msgs{padding:0 13px 10px;display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.msg{padding:8px 11px;border-radius:8px;font-size:.8rem;line-height:1.55;}
.msg.u{background:var(--navy);color:#fff;align-self:flex-end;max-width:88%;border-radius:8px 8px 2px 8px;}
.msg.a{background:var(--bg);color:var(--text);border:1px solid var(--border);max-width:96%;}
.msg.think{color:var(--t3);font-style:italic;display:flex;align-items:center;gap:6px;font-size:.76rem;}
.msg.think::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--gold);animation:blink 1s infinite;display:inline-block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.chat-row{display:flex;align-items:center;gap:6px;padding:7px 13px 12px;border-top:1px solid var(--border);}
.chat-row input{flex:1;border:none;background:var(--bg);padding:7px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--text);outline:none;}
.chat-row input::placeholder{color:var(--t3);}
.sbtn{width:32px;height:32px;border-radius:6px;background:var(--navy);border:none;cursor:pointer;color:var(--gold-bright);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sbtn:active{background:var(--gold);color:var(--navy);}
.sbtn svg{width:12px;height:12px;}
.quick-sugs{display:flex;flex-wrap:wrap;gap:5px;padding:0 13px 10px;}
.qs{padding:4px 10px;border-radius:20px;border:1px solid var(--gold-b);background:var(--gold-l);color:var(--gold);font-size:.7rem;font-weight:500;cursor:pointer;}
.qs:active{background:var(--gold);color:#fff;}
.card.text{max-width:320px;}
.tbody{padding:4px 13px 14px;font-size:.8rem;line-height:1.65;color:var(--text);max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tbody h3{font-size:.83rem;font-weight:600;margin:8px 0 4px;color:var(--navy);}
.tbody p{margin-bottom:5px;}
.card.matrix{max-width:94vw;min-width:280px;}
.mtable{width:calc(100% - 26px);border-collapse:collapse;font-size:.74rem;margin:0 13px 13px;}
.mtable th{padding:6px 8px;text-align:left;background:var(--navy);color:var(--gold-bright);font-weight:600;border:1px solid #2a3460;font-size:.68rem;}
.mtable td{padding:6px 8px;border:1px solid var(--border);color:var(--text);vertical-align:top;line-height:1.4;}
.mtable .rh{font-weight:600;color:var(--navy);background:var(--navy-l);white-space:nowrap;}
.card.note{min-width:180px;max-width:280px;}
.nbody{padding:4px 13px 13px;}
.nbody textarea{width:100%;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.8rem;line-height:1.6;color:var(--text);resize:none;min-height:70px;outline:none;}
.card.url{max-width:300px;}
.platform-bar{height:4px;border-radius:var(--r) var(--r) 0 0;}
.pb-yt{background:#ff0000;}.pb-ig{background:linear-gradient(90deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
.pb-x{background:#000;}.pb-tt{background:linear-gradient(90deg,#69C9D0,#010101,#EE1D52);}
.pb-art{background:linear-gradient(90deg,var(--navy),var(--purple));}.pb-def{background:var(--border-s);}
.url-body{padding:0 13px 12px;}
.url-link{font-size:.7rem;color:var(--gold);word-break:break-all;text-decoration:none;font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
.url-summary{margin-top:6px;padding:7px 9px;background:var(--bg);border-radius:6px;font-size:.76rem;line-height:1.5;color:var(--text);border:1px solid var(--border);}
.url-btn-row{display:flex;gap:6px;margin-top:8px;}
.url-btn{flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;color:var(--t2);cursor:pointer;text-align:center;}
.url-btn:active{background:var(--gold-l);border-color:var(--gold-b);color:var(--gold);}
.url-warn{font-size:.7rem;color:var(--t3);margin-top:5px;font-style:italic;}
.card.spider{border-radius:50%;min-width:0;max-width:none;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;font-size:.72rem;font-weight:600;line-height:1.2;touch-action:none;}
.card.spider.main{width:100px;height:100px;background:var(--navy);color:var(--gold-bright);border-color:var(--navy);font-size:.78rem;box-shadow:0 4px 20px rgba(26,35,64,.3);}
.card.spider.sub{width:80px;height:80px;background:var(--white);color:var(--navy);border-color:var(--navy-b);}
.card.spider.idea{width:64px;height:64px;background:var(--white);color:var(--t2);border-color:var(--border-s);font-size:.66rem;}
/* BOTTOM TOOLBAR */
#bt{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:4px;background:var(--navy);border:1px solid #2a3460;border-radius:100px;padding:7px 14px;box-shadow:0 8px 32px rgba(26,35,64,.25);z-index:200;}
.bt-sep{width:1px;height:18px;background:#2a3460;}
.btb{width:34px;height:34px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#8890b0;}
.btb:active,.btb.on{background:var(--gold);color:var(--navy);}
.btb svg{width:15px;height:15px;}
.zoom-val{font-family:'DM Mono',monospace;font-size:.72rem;color:#8890b0;min-width:38px;text-align:center;}
#mhint{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:var(--navy);color:var(--gold-bright);border:1px solid var(--gold);padding:7px 18px;border-radius:20px;font-size:.75rem;font-weight:500;z-index:300;pointer-events:none;display:none;}
#mhint.on{display:block;}
#toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--navy);color:var(--gold-bright);border:1px solid var(--gold);padding:8px 16px;border-radius:8px;font-size:.77rem;z-index:9999;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes pop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.popin{animation:pop .2s cubic-bezier(.34,1.4,.64,1) forwards;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:3px;}
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="/">
    <svg viewBox="0 0 28 28" fill="none"><path d="M14 4C8.477 4 4 8.477 4 14s4.477 10 10 10 10-4.477 10-10c0-2.761-1.239-5.239-3-6.941" stroke="#d4a017" stroke-width="1.8" stroke-linecap="round"/><path d="M14 8c-3.314 0-6 2.686-6 6s2.686 6 6 6 6-2.686 6-6c0-1.657-.672-3.157-1.757-4.243" stroke="#d4a017" stroke-width="1.6" stroke-linecap="round" opacity=".8"/><path d="M14 11c-1.657 0-3 1.343-3 3s1.343 3 3 3 3-1.343 3-3" stroke="#d4a017" stroke-width="1.4" stroke-linecap="round" opacity=".6"/><circle cx="14" cy="14" r="1.5" fill="#d4a017" opacity=".9"/></svg>
    The Fibonacci Web
  </a>
  <div class="t-sep"></div>
  <input class="canvas-name" id="canvas-name" value="Untitled" type="text" spellcheck="false">
  <div class="spacer"></div>
  <button class="tb" id="btn-save">💾</button>
  <button class="tb" id="btn-load">📂</button>
  <button class="tb" id="btn-new">＋</button>
</div>

<div id="cw">
  <svg id="esvg"><g id="eg"></g><path id="tline"/></svg>
  <div id="world"></div>

  <div id="center-ui">
    <div class="center-phi">φ</div>
    <div class="center-title">The Fibonacci Web</div>
    <div class="sugs">
      <span class="sug-pill" data-prompt="Research this topic and map out the key ideas">🔍 Research a topic</span>
      <span class="sug-pill" data-prompt="Create a comparison matrix of these ideas">⊞ Compare ideas</span>
      <span class="sug-pill" data-prompt="What are the main sub-topics I should explore?">🌿 Sub-topics</span>
    </div>
    <div class="prompt-bar">
      <input id="main-input" type="text" placeholder="Ask, research, or drop a URL…" autocomplete="off">
      <button class="pb-send" id="main-send">→</button>
    </div>
    <div class="sugs">
      <span class="sug-pill" data-prompt="Build a spider map about the future of electric vehicles">🕸 Spider map</span>
      <span class="sug-pill" data-url="true">🔗 Add a URL</span>
      <span class="sug-pill" data-prompt="What are the latest trends in AI tools?">✦ AI trends</span>
    </div>
  </div>

  <div id="bt">
    <button class="btb on" id="bt-select" title="Select">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l10 6-5 1-2 5z"/></svg>
    </button>
    <button class="btb" id="bt-connect" title="Connect">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="3.5" cy="8" r="2"/><circle cx="12.5" cy="8" r="2"/><path d="M5.5 8h5"/></svg>
    </button>
    <div class="bt-sep"></div>
    <button class="btb" id="bt-chat" title="Chat">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 10a2 2 0 01-2 2H5l-3 3V4a2 2 0 012-2h8a2 2 0 012 2z"/></svg>
    </button>
    <button class="btb" id="bt-note" title="Note">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 6h6M5 9h4"/></svg>
    </button>
    <button class="btb" id="bt-url" title="URL">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6.5 9.5a3.5 3.5 0 005 0l2-2a3.5 3.5 0 00-5-5L7 4"/><path d="M9.5 6.5a3.5 3.5 0 00-5 0l-2 2a3.5 3.5 0 005 5L9 12"/></svg>
    </button>
    <button class="btb" id="bt-spider" title="Spider node">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2M4 4l1.5 1.5M10.5 10.5L12 12M12 4l-1.5 1.5M5.5 10.5L4 12"/></svg>
    </button>
    <div class="bt-sep"></div>
    <button class="btb" id="bt-zi">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M10.5 10.5l3 3M5 7h4M7 5v4"/></svg>
    </button>
    <span class="zoom-val" id="zlbl">100%</span>
    <button class="btb" id="bt-zo">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M10.5 10.5l3 3M5 7h4"/></svg>
    </button>
    <button class="btb" id="bt-fit">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6V2h4M10 2h4v4M14 10v4h-4M6 14H2v-4"/></svg>
    </button>
  </div>
  <div id="mhint"></div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════
// STATE
// ═══════════════════════════
let cards=[],edges=[],nextId=1;
let pan={x:0,y:0},zoom=1;
let connectMode=false,connectSrc=null;
let selectedId=null;

const world=document.getElementById('world');
const eg=document.getElementById('eg');
const tline=document.getElementById('tline');
const mhint=document.getElementById('mhint');
const cw=document.getElementById('cw');
const centerUI=document.getElementById('center-ui');

// ═══════════════════════════
// UTILS
// ═══════════════════════════
const uid=()=>'c'+(nextId++);
const euid=()=>'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sc2cv=(sx,sy)=>({x:(sx-pan.x)/zoom,y:(sy-pan.y)/zoom});
const cv2sc=(cx,cy)=>({x:cx*zoom+pan.x,y:cy*zoom+pan.y});
function ccenter(){const r=cw.getBoundingClientRect();return sc2cv(r.width/2,r.height/2);}
function scatter(n=100){return(Math.random()-.5)*n;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}
function updateCenterUI(){centerUI.classList.toggle('hidden',cards.length>0);}

// ═══════════════════════════
// POINTER UTILS (mouse + touch unified)
// ═══════════════════════════
function getPoint(e){
  if(e.touches) return {x:e.touches[0].clientX,y:e.touches[0].clientY};
  return {x:e.clientX,y:e.clientY};
}

// ═══════════════════════════
// API
// ═══════════════════════════
async function callAPI(body){
  const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json();
  if(!res.ok)throw new Error(data.error?.message||data.error||'API error');
  return data;
}

// ═══════════════════════════
// PLATFORM
// ═══════════════════════════
function detectPlatform(url){
  const u=(url||'').toLowerCase();
  if(u.includes('youtube.com')||u.includes('youtu.be'))return'yt';
  if(u.includes('instagram.com'))return'ig';
  if(u.includes('twitter.com')||u.includes('x.com'))return'x';
  if(u.includes('tiktok.com'))return'tt';
  return'art';
}
const pNames={yt:'YouTube',ig:'Instagram',x:'X / Twitter',tt:'TikTok',art:'Article',def:'Link'};
const pIcons={yt:'▶',ig:'📷',x:'𝕏',tt:'♪',art:'📰',def:'🔗'};
const pColors={yt:'#ff0000',ig:'#e1306c',x:'#000',tt:'#EE1D52',art:'var(--navy)',def:'var(--t3)'};

// ═══════════════════════════
// EDGES
// ═══════════════════════════
function renderEdges(){
  eg.innerHTML='';
  edges.forEach(e=>{
    const a=cards.find(c=>c.id===e.from),b=cards.find(c=>c.id===e.to);
    if(!a||!b)return;
    const as=cv2sc(a.x,a.y),bs=cv2sc(b.x,b.y);
    const dx=bs.x-as.x,dy=bs.y-as.y,bend=.18;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${as.x},${as.y} C${as.x+dx*.3-dy*bend},${as.y+dy*.3+dx*bend} ${bs.x-dx*.3-dy*bend},${bs.y-dy*.3+dx*bend} ${bs.x},${bs.y}`);
    path.setAttribute('class','eline');
    path.addEventListener('click',()=>{if(confirm('Remove?')){edges=edges.filter(x=>x.id!==e.id);renderEdges();}});
    eg.appendChild(path);
  });
}

function renderMD(t){
  return(t||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/###\s(.+)/g,'<h3>$1</h3>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>').replace(/^(.)/,'<p>$1').replace(/(.)$/,'$1</p>');
}

const ACTS=id=>`<div class="cacts"><button class="cact" data-action="connect" data-id="${id}">⟶</button><button class="cact" data-action="delete" data-id="${id}">✕</button></div>`;

// ═══════════════════════════
// CARD HTML
// ═══════════════════════════
function buildHTML(c){
  if(c.type==='spider')return`<span>${esc(c.data.label||'')}</span>`;
  if(c.type==='chat'){
    const msgs=(c.data.messages||[]).map(m=>`<div class="msg ${m.role==='user'?'u':'a'}">${esc(m.text)}</div>`).join('');
    return`<div class="chandle" data-drag="${c.id}"><div class="cicon" style="background:var(--navy-l);color:var(--navy)">💬</div><div class="ctitle">${esc(c.data.title||'AI Chat')}</div>${ACTS(c.id)}</div><div class="chat-msgs" id="msgs-${c.id}">${msgs}</div><div class="quick-sugs"><span class="qs" data-sug="Search the web for this topic">🔍 Search</span><span class="qs" data-sug="Create a comparison matrix">⊞ Matrix</span><span class="qs" data-sug="What sub-topics should I explore?">🌿 Sub-topics</span><span class="qs" data-sug="Summarise what we've discussed">φ Summarise</span></div><div class="chat-row"><input type="text" id="inp-${c.id}" placeholder="Ask anything…" autocomplete="off"><button class="sbtn" id="send-${c.id}"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8l12-6-5 6 5 6z"/></svg></button></div>`;
  }
  if(c.type==='text')return`<div class="chandle" data-drag="${c.id}"><div class="cicon" style="background:var(--amber-l);color:var(--amber)">📄</div><div class="ctitle">${esc(c.data.title||'Response')}</div>${ACTS(c.id)}</div><div class="tbody">${renderMD(c.data.content||'')}</div>`;
  if(c.type==='matrix'){
    const cols=c.data.cols||[];
    let tbl=`<table class="mtable"><thead><tr><th></th>${cols.map(col=>`<th>${esc(col)}</th>`).join('')}</tr></thead><tbody>`;
    (c.data.rows||[]).forEach(r=>{tbl+=`<tr><td class="rh">${esc(r.label)}</td>${(r.cells||[]).map(cell=>`<td>${esc(cell)}</td>`).join('')}</tr>`;});
    return`<div class="chandle" data-drag="${c.id}"><div class="cicon" style="background:var(--purple-l);color:var(--purple)">⊞</div><div class="ctitle">${esc(c.data.title||'Matrix')}</div>${ACTS(c.id)}</div>${tbl}</table>`;
  }
  if(c.type==='note')return`<div class="chandle" data-drag="${c.id}"><div class="cicon" style="background:var(--green-l);color:var(--green)">📝</div><div class="ctitle">${esc(c.data.title||'Note')}</div>${ACTS(c.id)}</div><div class="nbody"><textarea id="note-${c.id}" placeholder="Write anything…">${esc(c.data.text||'')}</textarea></div>`;

if(c.type===‘url’){
const p=c.data.platform||‘def’;const col=pColors[p];
const summary=c.data.summary?`<div class="url-summary">🤖 ${esc(c.data.summary)}</div>`:’’;
const warn=(p===‘ig’||p===‘tt’)?`<div class="url-warn">⚠️ ${pNames[p]} is login-walled</div>`:’’;
const btns=!c.data.summary?`<div class="url-btn-row"><button class="url-btn" data-action="summarise" data-id="${c.id}">🤖 AI Summarise</button><button class="url-btn" data-action="expand" data-id="${c.id}">🌿 Expand to map</button></div>`:’’;
return`<div class="platform-bar pb-${p}"></div><div class="chandle" data-drag="${c.id}"><div class="cicon" style="background:${col}18;color:${col};font-size:1rem">${pIcons[p]}</div><div class="ctitle">${esc(c.data.cardTitle||pNames[p])}</div>${ACTS(c.id)}</div><div class="url-body"><a class="url-link" href="${esc(c.data.url||'')}" target="_blank" rel="noopener">${esc(c.data.url||'')}</a>${summary}${warn}${btns}</div>`;
}
return’’;
}

// ═══════════════════════════
// DRAGGABLE ELEMENT
// Makes any element draggable with both mouse and touch
// ═══════════════════════════
function makeDraggable(el, c){
let startX,startY,startCX,startCY,isDragging=false;

function onStart(e){
if(connectMode){handleConnect(c.id);return;}
// Don’t drag if tapping buttons/inputs
if(e.target.closest(‘button’)||e.target.closest(‘input’)||e.target.closest(‘textarea’)||e.target.closest(‘a’))return;
e.stopPropagation();
const pt=getPoint(e);
startX=pt.x;startY=pt.y;
startCX=c.x;startCY=c.y;
isDragging=false;
document.addEventListener(‘mousemove’,onMove);
document.addEventListener(‘mouseup’,onEnd);
document.addEventListener(‘touchmove’,onMove,{passive:false});
document.addEventListener(‘touchend’,onEnd);
}

function onMove(e){
if(e.cancelable)e.preventDefault();
const pt=getPoint(e);
const dx=pt.x-startX,dy=pt.y-startY;
if(Math.abs(dx)>4||Math.abs(dy)>4)isDragging=true;
if(!isDragging)return;
c.x=startCX+dx/zoom;
c.y=startCY+dy/zoom;
el.style.left=c.x+‘px’;
el.style.top=c.y+‘px’;
renderEdges();
}

function onEnd(){
document.removeEventListener(‘mousemove’,onMove);
document.removeEventListener(‘mouseup’,onEnd);
document.removeEventListener(‘touchmove’,onMove);
document.removeEventListener(‘touchend’,onEnd);
}

el.addEventListener(‘mousedown’,onStart);
el.addEventListener(‘touchstart’,onStart,{passive:false});
}

// ═══════════════════════════
// BUILD CARD
// ═══════════════════════════
function buildCard(c,isNew=false){
let el=document.getElementById(‘card-’+c.id);
if(!el){el=document.createElement(‘div’);el.id=‘card-’+c.id;world.appendChild(el);}
el.className=‘card ‘+c.type+(c.type===‘spider’?’ ‘+(c.data.role||‘sub’):’’)+(isNew?’ popin’:’’);
el.style.left=c.x+‘px’;el.style.top=c.y+‘px’;
if(c.type===‘spider’){const sz={main:100,sub:80,idea:64}[c.data.role||‘sub’]||80;el.style.width=sz+‘px’;el.style.height=sz+‘px’;}
el.innerHTML=buildHTML(c);
bindCard(el,c);
if(isNew)setTimeout(()=>el.classList.remove(‘popin’),300);
return el;
}

function rebuildCard(c){const el=document.getElementById(‘card-’+c.id);if(!el)return buildCard(c);el.innerHTML=buildHTML(c);bindCard(el,c);}

function bindCard(el,c){
// Make draggable via handle or whole card for spider
const handle=el.querySelector(’[data-drag]’)||(c.type===‘spider’?el:null);
if(handle) makeDraggable(handle,c);

if(c.type===‘spider’){
el.addEventListener(‘click’,e=>{if(!connectMode&&!e.target.closest(‘button’))selectCard(c.id);});
el.addEventListener(‘touchend’,e=>{if(!connectMode)selectCard(c.id);},{passive:true});
}

// Action buttons
el.addEventListener(‘click’,e=>{
const btn=e.target.closest(’[data-action]’);if(!btn)return;
const{action,id}=btn.dataset;
if(action===‘delete’)deleteCard(id);
if(action===‘connect’){setConnectMode(true);handleConnect(id);}
if(action===‘summarise’)aiSummarise(id);
if(action===‘expand’)aiExpand(id);
});

// Quick suggestions
el.querySelectorAll(’.qs’).forEach(s=>s.addEventListener(‘click’,()=>{
const inp=document.getElementById(‘inp-’+c.id);
if(inp){inp.value=s.dataset.sug;document.getElementById(‘send-’+c.id)?.click();}
}));

// Chat send
const send=document.getElementById(‘send-’+c.id);
const inp=document.getElementById(‘inp-’+c.id);
if(send&&inp){
const go=()=>{const t=inp.value.trim();if(!t)return;inp.value=’’;chatSend(c,t);};
send.addEventListener(‘click’,go);
inp.addEventListener(‘keydown’,e=>{if(e.key===‘Enter’)go();});
}

// Note
const nt=document.getElementById(‘note-’+c.id);
if(nt)nt.addEventListener(‘input’,()=>c.data.text=nt.value);
}

function selectCard(id){selectedId=id;document.querySelectorAll(’.card’).forEach(el=>el.classList.remove(‘sel’));document.getElementById(‘card-’+id)?.classList.add(‘sel’);}
function deleteCard(id){cards=cards.filter(c=>c.id!==id);edges=edges.filter(e=>e.from!==id&&e.to!==id);document.getElementById(‘card-’+id)?.remove();renderEdges();updateCenterUI();}
function addCard(type,data={},ox=0,oy=0){const cc=ccenter();const c={id:uid(),type,x:cc.x+ox+scatter(),y:cc.y+oy+scatter(),data:{…data}};cards.push(c);buildCard(c,true);updateCenterUI();return c;}

// ═══════════════════════════
// CONNECT MODE
// ═══════════════════════════
function setConnectMode(on){
connectMode=on;
document.getElementById(‘bt-connect’).classList.toggle(‘on’,on);
mhint.textContent=on?(connectSrc?‘Tap TARGET card’:‘Tap SOURCE card’):’’;
mhint.classList.toggle(‘on’,on);
if(!on){connectSrc=null;tline.style.display=‘none’;document.querySelectorAll(’.csrc’).forEach(el=>el.classList.remove(‘csrc’));}
}

function handleConnect(id){
if(!connectSrc){connectSrc=id;document.getElementById(‘card-’+id)?.classList.add(‘csrc’);mhint.textContent=‘Tap TARGET card’;tline.style.display=’’;}
else{
if(id!==connectSrc&&!edges.find(e=>(e.from===connectSrc&&e.to===id)||(e.from===id&&e.to===connectSrc)))
edges.push({id:euid(),from:connectSrc,to:id});
renderEdges();setConnectMode(false);
}
}

// ═══════════════════════════
// PAN + ZOOM (mouse + touch + pinch)
// ═══════════════════════════
let panActive=false,panStart={x:0,y:0};
let pinchActive=false,pinchStartDist=0,pinchStartZoom=1;
let lastTouchCount=0;

function onCanvasPointerStart(e){
if(e.target!==cw&&e.target.id!==‘world’&&!e.target.closest(’#esvg’))return;
if(connectMode){setConnectMode(false);return;}

if(e.touches){
lastTouchCount=e.touches.length;
if(e.touches.length===2){
// Pinch to zoom
pinchActive=true;panActive=false;
pinchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
pinchStartZoom=zoom;
return;
}
if(e.touches.length===1){
panActive=true;
panStart={x:e.touches[0].clientX-pan.x,y:e.touches[0].clientY-pan.y};
}
}else{
panActive=true;
panStart={x:e.clientX-pan.x,y:e.clientY-pan.y};
}
}

function onCanvasPointerMove(e){
if(e.touches&&e.touches.length===2&&pinchActive){
e.preventDefault();
const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
const f=dist/pinchStartDist;
const midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
const midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
const r=cw.getBoundingClientRect();
const mx=midX-r.left,my=midY-r.top;
const newZoom=Math.min(3,Math.max(.1,pinchStartZoom*f));
pan.x=mx-(mx-pan.x)*(newZoom/zoom);
pan.y=my-(my-pan.y)*(newZoom/zoom);
zoom=newZoom;
applyT();renderEdges();updateZoom();
return;
}

if(!panActive)return;
if(e.cancelable&&e.touches)e.preventDefault();
const pt=getPoint(e);
pan.x=pt.x-panStart.x;
pan.y=pt.y-panStart.y;
applyT();renderEdges();

// Update connect line
if(connectMode&&connectSrc){
const src=cards.find(c=>c.id===connectSrc);if(!src)return;
const ss=cv2sc(src.x,src.y);const r=cw.getBoundingClientRect();
tline.setAttribute(‘d’,`M${ss.x},${ss.y} Q${(ss.x+pt.x-r.left)/2},${(ss.y+pt.y-r.top)/2} ${pt.x-r.left},${pt.y-r.top}`);
}
}

function onCanvasPointerEnd(){
panActive=false;pinchActive=false;
}

// Canvas events
cw.addEventListener(‘mousedown’,onCanvasPointerStart);
cw.addEventListener(‘touchstart’,onCanvasPointerStart,{passive:false});
document.addEventListener(‘mousemove’,onCanvasPointerMove);
document.addEventListener(‘touchmove’,onCanvasPointerMove,{passive:false});
document.addEventListener(‘mouseup’,onCanvasPointerEnd);
document.addEventListener(‘touchend’,onCanvasPointerEnd);

// Scroll zoom
cw.addEventListener(‘wheel’,e=>{
e.preventDefault();
const f=e.deltaY<0?1.07:.94;
const r=cw.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
pan.x=mx-(mx-pan.x)*f;pan.y=my-(my-pan.y)*f;
zoom=Math.min(3,Math.max(.1,zoom*f));
applyT();renderEdges();updateZoom();
},{passive:false});

function applyT(){world.style.transform=`translate(${pan.x}px,${pan.y}px) scale(${zoom})`;world.style.transformOrigin=‘0 0’;}
function updateZoom(){document.getElementById(‘zlbl’).textContent=Math.round(zoom*100)+’%’;}
function fitView(){
if(!cards.length){pan={x:0,y:0};zoom=1;applyT();renderEdges();updateZoom();return;}
const xs=cards.map(c=>c.x),ys=cards.map(c=>c.y),pad=100;
const minX=Math.min(…xs)-pad,maxX=Math.max(…xs)+pad+280,minY=Math.min(…ys)-pad,maxY=Math.max(…ys)+pad+160;
const W=cw.offsetWidth,H=cw.offsetHeight;
zoom=Math.min(W/(maxX-minX),H/(maxY-minY),1.4);
pan.x=(W-(maxX+minX)*zoom)/2;pan.y=(H-(maxY+minY)*zoom)/2;
applyT();renderEdges();updateZoom();
}

// ═══════════════════════════
// CENTER PROMPT
// ═══════════════════════════
function addURLCard(){
const url=prompt(‘Paste a URL:’,‘https://’);if(!url||url===‘https://’)return;
const platform=detectPlatform(url);
const c=addCard(‘url’,{url,platform,cardTitle:pNames[platform]||‘Link’,summary:null});
if(platform===‘art’||platform===‘yt’||platform===‘x’)setTimeout(()=>aiSummarise(c.id),400);
}

document.querySelectorAll(’.sug-pill’).forEach(pill=>{
pill.addEventListener(‘click’,()=>{
if(pill.dataset.url){addURLCard();return;}
const inp=document.getElementById(‘main-input’);if(inp)inp.value=pill.dataset.prompt||’’;
document.getElementById(‘main-send’).click();
});
});

document.getElementById(‘main-send’).addEventListener(‘click’,()=>{
const inp=document.getElementById(‘main-input’);const text=inp.value.trim();if(!text)return;
inp.value=’’;const c=addCard(‘chat’,{title:‘AI Chat’,messages:[]});setTimeout(()=>chatSend(c,text),100);
});
document.getElementById(‘main-input’).addEventListener(‘keydown’,e=>{if(e.key===‘Enter’)document.getElementById(‘main-send’).click();});

// ═══════════════════════════
// AI: CHAT
// ═══════════════════════════
async function chatSend(c,text){
if(!c.data.messages)c.data.messages=[];
c.data.messages.push({role:‘user’,text});
const msgBox=document.getElementById(‘msgs-’+c.id);
if(msgBox){
const um=document.createElement(‘div’);um.className=‘msg u’;um.textContent=text;msgBox.appendChild(um);
const th=document.createElement(‘div’);th.className=‘msg think’;th.textContent=‘Thinking…’;th.id=‘think-’+c.id;
msgBox.appendChild(th);msgBox.scrollTop=msgBox.scrollHeight;
}
try{
const hist=c.data.messages.slice(0,-1).map(m=>({role:m.role===‘user’?‘user’:‘assistant’,content:m.text}));
hist.push({role:‘user’,content:text});
const data=await callAPI({
system:`You are a research assistant on The Fibonacci Web. For matrix requests respond ONLY with JSON: {"type":"matrix","title":"...","cols":["A","B"],"rows":[{"label":"Row","cells":["a","b"]}]} Otherwise use plain text with **bold** and ### headers. Be concise.`,
messages:hist,max_tokens:1200
});
const raw=data.content?.filter(b=>b.type===‘text’).map(b=>b.text).join(’\n’)||‘No response.’;
document.getElementById(‘think-’+c.id)?.remove();
let parsed=null;try{if(raw.trim().startsWith(’{’))parsed=JSON.parse(raw.trim());}catch(e){}
if(parsed?.type===‘matrix’){
const nc=addCard(‘matrix’,{title:parsed.title,cols:parsed.cols,rows:parsed.rows},320,0);
edges.push({id:euid(),from:c.id,to:nc.id});renderEdges();
c.data.messages.push({role:‘ai’,text:’⊞ Matrix: ’+parsed.title});
if(msgBox){const am=document.createElement(‘div’);am.className=‘msg a’;am.textContent=’⊞ Matrix: ’+parsed.title;msgBox.appendChild(am);msgBox.scrollTop=msgBox.scrollHeight;}
}else{
c.data.messages.push({role:‘ai’,text:raw});
if(msgBox){const am=document.createElement(‘div’);am.className=‘msg a’;am.innerHTML=renderMD(raw);msgBox.appendChild(am);msgBox.scrollTop=msgBox.scrollHeight;}
if(raw.length>280){const nc=addCard(‘text’,{title:‘Research’,content:raw},300,80);edges.push({id:euid(),from:c.id,to:nc.id});renderEdges();}
}
}catch(err){
document.getElementById(‘think-’+c.id)?.remove();
const em=’Error: ’+err.message;c.data.messages.push({role:‘ai’,text:em});
if(msgBox){const am=document.createElement(‘div’);am.className=‘msg a’;am.textContent=em;msgBox.appendChild(am);}
}
}

// ═══════════════════════════
// AI: SUMMARISE URL
// ═══════════════════════════
async function aiSummarise(id){
const c=cards.find(x=>x.id===id);if(!c)return;showToast(‘Researching…’);
const p=c.data.platform;
const prompt=p===‘ig’||p===‘tt’?`Saved ${pNames[p]} URL: ${c.data.url}. Login-walled. Describe what you can infer.`:`Summarise this URL in 3-4 sentences: ${c.data.url}`;
try{
const data=await callAPI({system:‘You are a research assistant. Be concise.’,messages:[{role:‘user’,content:prompt}],max_tokens:500});
const text=data.content?.filter(b=>b.type===‘text’).map(b=>b.text).join(’\n’)||‘Could not summarise.’;
c.data.summary=text;c.data.cardTitle=text.split(’\n’)[0].slice(0,55)||pNames[p];
rebuildCard(c);
const nc=addCard(‘text’,{title:’🔍 ’+pNames[p],content:text},280,0);
edges.push({id:euid(),from:id,to:nc.id});renderEdges();showToast(‘Done ✓’);
}catch(err){showToast(’Error: ’+err.message);}
}

// ═══════════════════════════
// AI: EXPAND TO MAP
// ═══════════════════════════
async function aiExpand(id){
const c=cards.find(x=>x.id===id);if(!c)return;showToast(‘Building map…’);
try{
const data=await callAPI({system:‘Respond ONLY with valid JSON, no markdown.’,messages:[{role:‘user’,content:`About: ${c.data.url}\nReturn ONLY: {"mainTopic":"...","subtopics":[{"label":"...","ideas":["...","..."]},{"label":"...","ideas":["...","..."]}]}`}],max_tokens:800});
let raw=(data.content?.filter(b=>b.type===‘text’).map(b=>b.text).join(’’)||’{}’).replace(/`json|`/g,’’).trim();
const parsed=JSON.parse(raw);
const main=addCard(‘spider’,{label:parsed.mainTopic||‘Topic’,role:‘main’},200,0);
edges.push({id:euid(),from:id,to:main.id});
(parsed.subtopics||[]).forEach((st,i)=>{
const angle=(i/parsed.subtopics.length)*Math.PI*2-Math.PI/2;
const sub=addCard(‘spider’,{label:st.label,role:‘sub’},200+Math.cos(angle)*170,Math.sin(angle)*170);
edges.push({id:euid(),from:main.id,to:sub.id});
(st.ideas||[]).forEach((idea,j)=>{
const ia=angle+((j-st.ideas.length/2+.5)*.5);
const ic=addCard(‘spider’,{label:idea,role:‘idea’},200+Math.cos(angle)*170+Math.cos(ia)*100,Math.sin(angle)*170+Math.sin(ia)*100);
edges.push({id:euid(),from:sub.id,to:ic.id});
});
});
renderEdges();fitView();showToast(‘Done ✓’);
}catch(err){showToast(’Error: ’+err.message);}
}

world.innerHTML=’’;eg.innerHTML=’’;cards.forEach(c=>buildCard(c));renderEdges();updateCenterUI();fitView();showToast(‘Loaded ✓’);
});
document.getElementById(‘btn-new’).addEventListener(‘click’,()=>{
if(cards.length&&!confirm(‘New canvas?’))return;
cards=[];edges=[];world.innerHTML=’’;eg.innerHTML=’’;
document.getElementById(‘canvas-name’).value=‘Untitled’;updateCenterUI();showToast(‘New canvas’);
});

document.addEventListener(‘keydown’,e=>{
if(e.key===‘Escape’)setConnectMode(false);
if((e.key===‘Delete’||e.key===‘Backspace’)&&selectedId&&![‘INPUT’,‘TEXTAREA’].includes(document.activeElement.tagName)){deleteCard(selectedId);selectedId=null;}
});

applyT();
