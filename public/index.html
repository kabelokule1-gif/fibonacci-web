<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Fibonacci Web</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080b14;
  --white:#fefcf9;
  --border:rgba(255,255,255,.1);
  --border-s:rgba(255,255,255,.18);
  --text:#e8e4dc;
  --t2:#a8a49c;
  --t3:#606068;
  --gold:#d4a82e;
  --gold-l:rgba(212,168,46,.12);
  --gold-b:rgba(212,168,46,.35);
  --navy:#0d1228;
  --navy-l:rgba(100,130,220,.12);
  --green:#1e6b4a;
  --green-l:rgba(30,107,74,.15);
  --amber:#c07810;
  --amber-l:rgba(192,120,16,.12);
  --purple:#8040c8;
  --purple-l:rgba(128,64,200,.12);
  --sh:0 2px 12px rgba(0,0,0,.4);
  --shm:0 8px 32px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);
  --r:12px;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;color:var(--text)}

/* GALAXY BACKGROUND - CSS only */
body{background:radial-gradient(ellipse at 20% 50%, rgba(60,20,120,.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(20,40,100,.15) 0%, transparent 50%), radial-gradient(ellipse at 50% 80%, rgba(80,30,80,.1) 0%, transparent 50%), #080b14}
#galaxy{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.8) 0%, transparent 100%), radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,.6) 0%, transparent 100%), radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,.9) 0%, transparent 100%), radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,.7) 0%, transparent 100%), radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,.5) 0%, transparent 100%), radial-gradient(1.5px 1.5px at 85% 45%, rgba(255,255,255,.8) 0%, transparent 100%), radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,.6) 0%, transparent 100%), radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,.4) 0%, transparent 100%), radial-gradient(1px 1px at 60% 75%, rgba(255,255,255,.7) 0%, transparent 100%), radial-gradient(1.5px 1.5px at 75% 90%, rgba(255,255,255,.9) 0%, transparent 100%), radial-gradient(1px 1px at 90% 65%, rgba(255,255,255,.5) 0%, transparent 100%), radial-gradient(1px 1px at 5% 45%, rgba(255,255,255,.6) 0%, transparent 100%), radial-gradient(1px 1px at 45% 50%, rgba(255,220,180,.6) 0%, transparent 100%), radial-gradient(1px 1px at 20% 20%, rgba(200,210,255,.7) 0%, transparent 100%), radial-gradient(1px 1px at 65% 40%, rgba(255,255,255,.5) 0%, transparent 100%), radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,.4) 0%, transparent 100%), radial-gradient(1px 1px at 80% 80%, rgba(255,255,255,.6) 0%, transparent 100%), radial-gradient(1px 1px at 95% 30%, rgba(255,255,255,.5) 0%, transparent 100%), radial-gradient(1px 1px at 50% 95%, rgba(255,255,255,.4) 0%, transparent 100%), radial-gradient(1px 1px at 8% 88%, rgba(255,255,255,.6) 0%, transparent 100%)}

/* TOPBAR */
.top{height:50px;background:rgba(8,11,20,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;position:relative;z-index:100}
.logo{font-family:‘Cormorant Garamond’,serif;font-size:1.05rem;font-weight:600;color:var(–gold);display:flex;align-items:center;gap:8px;text-decoration:none}
.logo svg{width:22px;height:22px}
.sp{flex:1}
.tbtn{padding:5px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.4);font-family:‘DM Sans’,sans-serif;font-size:.73rem;cursor:pointer}
.tbtn:active{background:rgba(212,168,46,.15);color:var(–gold);border-color:var(–gold-b)}
.cname{font-size:.75rem;color:rgba(255,255,255,.35);padding:3px 7px;border:1px solid transparent;border-radius:5px;background:transparent;font-family:‘DM Sans’,sans-serif;outline:none;max-width:120px}
.cname:focus{border-color:var(–gold);color:var(–gold);background:rgba(212,168,46,.05)}

/* CANVAS */
#cw{position:fixed;top:50px;left:0;right:0;bottom:0;overflow:hidden;z-index:1}
#world{position:absolute;top:0;left:0;transform-origin:0 0;width:0;height:0}
#esvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:2}
.eline{stroke:rgba(212,168,46,.3);stroke-width:1.5;fill:none}
.eline:hover{stroke:var(–gold)}

/* HOME SCREEN */
#home{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);display:flex;flex-direction:column;align-items:center;gap:20px;z-index:50;width:92%;max-width:560px;pointer-events:none}
#home.gone{display:none}
.home-phi{font-family:‘Cormorant Garamond’,serif;font-size:3rem;color:var(–gold);opacity:.15;line-height:1;pointer-events:none;text-shadow:0 0 40px rgba(212,168,46,.4)}
.home-title{font-family:‘Cormorant Garamond’,serif;font-size:1rem;font-weight:600;color:var(–t2);letter-spacing:.12em;text-transform:uppercase;pointer-events:none}
.pills{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;pointer-events:all}
.pill{padding:7px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:100px;font-size:.77rem;color:var(–t2);cursor:pointer;backdrop-filter:blur(8px);white-space:nowrap;transition:all .15s}
.pill:active{background:var(–gold-l);border-color:var(–gold-b);color:var(–gold)}
.searchbar{pointer-events:all;display:flex;align-items:center;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);border-radius:100px;padding:6px 6px 6px 20px;backdrop-filter:blur(16px);width:100%;transition:border-color .15s,box-shadow .15s}
.searchbar:focus-within{border-color:var(–gold-b);box-shadow:0 0 0 3px var(–gold-l),0 8px 32px rgba(0,0,0,.4)}
.searchbar input{flex:1;border:none;background:transparent;font-family:‘DM Sans’,sans-serif;font-size:.9rem;color:var(–text);outline:none;min-width:0}
.searchbar input::placeholder{color:var(–t3)}
.gobtn{width:40px;height:40px;border-radius:50%;background:var(–gold);border:none;cursor:pointer;color:var(–bg);font-size:1.2rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:600;transition:all .15s}
.gobtn:active{background:#e8be40;transform:scale(.95)}

/* CARDS */
.card{position:absolute;background:rgba(14,18,32,.85);border:1px solid rgba(255,255,255,.1);border-radius:var(–r);box-shadow:var(–shm);backdrop-filter:blur(20px);user-select:none;min-width:240px;z-index:10;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:rgba(255,255,255,.18);box-shadow:0 12px 48px rgba(0,0,0,.6),0 0 0 1px rgba(212,168,46,.1)}
.card.sel{border-color:var(–gold-b);box-shadow:var(–shm),0 0 0 2px var(–gold-l)}
.ch{display:flex;align-items:center;gap:8px;padding:12px 14px 9px;cursor:grab;border-radius:var(–r) var(–r) 0 0}
.ch:active{cursor:grabbing}
.ci{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.ct{font-size:.79rem;font-weight:600;color:var(–t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ca{display:flex;gap:3px}
.cb{width:26px;height:26px;border-radius:5px;background:none;border:none;cursor:pointer;color:var(–t3);font-size:.75rem;display:flex;align-items:center;justify-content:center}
.cb:active{background:rgba(255,255,255,.08);color:var(–text)}

/* CHAT CARD */
.card.chat{max-width:320px}
.msgs{padding:0 14px 10px;display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.msg{padding:8px 12px;border-radius:10px;font-size:.8rem;line-height:1.55}
.msg.u{background:var(–gold);color:var(–bg);align-self:flex-end;max-width:88%;border-radius:10px 10px 3px 10px;font-weight:500}
.msg.a{background:rgba(255,255,255,.06);color:var(–text);border:1px solid rgba(255,255,255,.08);max-width:96%}
.msg.a h3{font-size:.8rem;font-weight:600;color:var(–gold);margin:5px 0 3px}
.msg.a p{margin-bottom:4px}
.msg.a strong{color:var(–gold)}
.msg.t{color:var(–t3);font-style:italic;font-size:.75rem;display:flex;align-items:center;gap:6px}
.msg.t::before{content:’’;width:6px;height:6px;border-radius:50%;background:var(–gold);animation:pulse 1.2s infinite;display:inline-block;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.crow{display:flex;align-items:center;gap:6px;padding:8px 14px 12px;border-top:1px solid rgba(255,255,255,.07)}
.crow input{flex:1;border:none;background:rgba(255,255,255,.05);padding:8px 12px;border-radius:8px;font-family:‘DM Sans’,sans-serif;font-size:.8rem;color:var(–text);outline:none}
.crow input::placeholder{color:var(–t3)}
.crow input:focus{background:rgba(255,255,255,.08)}
.csend{width:32px;height:32px;border-radius:8px;background:var(–gold);border:none;cursor:pointer;color:var(–bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.csend:active{background:#e8be40}
.csend svg{width:13px;height:13px}
.qsugs{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 10px}
.qs{padding:4px 11px;border-radius:20px;border:1px solid var(–gold-b);background:var(–gold-l);color:var(–gold);font-size:.7rem;font-weight:500;cursor:pointer}
.qs:active{background:var(–gold);color:var(–bg)}

/* TEXT CARD */
.card.text{max-width:320px}
.tbody{padding:4px 14px 14px;font-size:.8rem;line-height:1.65;color:var(–t2);max-height:240px;overflow-y:auto}
.tbody::-webkit-scrollbar{width:3px}
.tbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.tbody h3{font-size:.82rem;font-weight:600;margin:7px 0 3px;color:var(–gold)}
.tbody p{margin-bottom:5px}
.tbody strong{color:var(–text)}

/* MATRIX CARD */
.card.matrix{max-width:90vw;min-width:260px}
.mt{width:calc(100% - 28px);border-collapse:collapse;font-size:.74rem;margin:0 14px 14px}
.mt th{padding:7px 10px;text-align:left;background:rgba(212,168,46,.1);color:var(–gold);font-weight:600;border:1px solid rgba(212,168,46,.15);font-size:.68rem;letter-spacing:.03em}
.mt td{padding:6px 10px;border:1px solid rgba(255,255,255,.07);color:var(–t2);vertical-align:top;line-height:1.4}
.mt .rh{font-weight:600;color:var(–text);background:rgba(255,255,255,.03)}

/* NOTE CARD */
.card.note{min-width:180px;max-width:280px}
.nb{padding:4px 14px 14px}
.nb textarea{width:100%;border:none;background:transparent;font-family:‘DM Sans’,sans-serif;font-size:.8rem;line-height:1.6;color:var(–t2);resize:none;min-height:70px;outline:none}
.nb textarea::placeholder{color:var(–t3)}

/* URL CARD */
.card.url{max-width:300px}
.urlbody{padding:0 14px 12px}
.urllink{font-size:.7rem;color:var(–gold);word-break:break-all;text-decoration:none;font-family:‘DM Mono’,monospace;display:block;margin-bottom:6px;opacity:.7}
.urllink:hover{opacity:1}
.urlsum{margin-top:6px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:8px;font-size:.77rem;line-height:1.5;color:var(–t2);border:1px solid rgba(255,255,255,.07)}
.urlbtns{display:flex;gap:6px;margin-top:8px}
.urlbtn{flex:1;padding:7px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-family:‘DM Sans’,sans-serif;font-size:.72rem;font-weight:500;color:var(–t2);cursor:pointer;text-align:center}
.urlbtn:active{background:var(–gold-l);border-color:var(–gold-b);color:var(–gold)}

/* SPIDER NODES */
.card.spider{border-radius:50%;min-width:0;max-width:none;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;font-size:.71rem;font-weight:600;line-height:1.2}
.card.spider.main{width:100px;height:100px;background:rgba(212,168,46,.15);color:var(–gold);border-color:rgba(212,168,46,.4);font-size:.78rem;box-shadow:0 0 30px rgba(212,168,46,.2),var(–shm)}
.card.spider.sub{width:80px;height:80px;background:rgba(100,130,220,.1);color:#8ab0f0;border-color:rgba(100,130,220,.3)}
.card.spider.idea{width:64px;height:64px;background:rgba(255,255,255,.04);color:var(–t2);border-color:rgba(255,255,255,.1);font-size:.65rem}

/* BOTTOM TOOLBAR */
#bt{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:4px;background:rgba(8,11,20,.9);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:8px 16px;backdrop-filter:blur(20px);z-index:50;box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(212,168,46,.06)}
.bsep{width:1px;height:18px;background:rgba(255,255,255,.08)}
.bb{width:38px;height:38px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35)}
.bb:active,.bb.on{background:var(–gold);color:var(–bg)}
.bb svg{width:15px;height:15px}
.zv{font-family:‘DM Mono’,monospace;font-size:.71rem;color:rgba(255,255,255,.3);min-width:38px;text-align:center}

/* HINT */
#hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:var(–navy);color:var(–gold);border:1px solid var(–gold-b);padding:7px 20px;border-radius:20px;font-size:.75rem;font-weight:500;z-index:100;pointer-events:none;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#hint.on{display:block}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(8,11,20,.95);color:var(–gold);border:1px solid var(–gold-b);padding:8px 18px;border-radius:10px;font-size:.77rem;z-index:999;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;backdrop-filter:blur(20px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ANIMATIONS */
@keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.pop{animation:pop .25s cubic-bezier(.34,1.4,.64,1) forwards}
@keyframes startwinkle{0%,100%{opacity:1}50%{opacity:.3}}
</style>

</head>
<body>

<div id="galaxy"></div>

<div class="top">
  <a class="logo" href="#">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9c0-2.49-1.01-4.74-2.64-6.36" stroke="#d4a82e" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5c0-1.38-.56-2.63-1.46-3.54" stroke="#d4a82e" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
      <circle cx="12" cy="12" r="1.5" fill="#d4a82e"/>
    </svg>
    The Fibonacci Web
  </a>
  <input class="cname" id="cname" value="Untitled" type="text" spellcheck="false">
  <div class="sp"></div>
  <button class="tbtn" onclick="saveC()">💾</button>
  <button class="tbtn" onclick="loadC()">📂</button>
  <button class="tbtn" onclick="newC()">＋</button>
</div>

<div id="cw">
  <svg id="esvg"><g id="eg"></g></svg>
  <div id="world"></div>

  <div id="home">
    <div class="home-phi">φ</div>
    <div class="home-title">The Fibonacci Web</div>
    <div class="pills">
      <span class="pill" onclick="usePill('Research this topic in depth and map out the key ideas')">🔍 Research</span>
      <span class="pill" onclick="usePill('Create a comparison matrix of these ideas')">⊞ Compare</span>
      <span class="pill" onclick="usePill('What sub-topics should I explore for this?')">🌿 Sub-topics</span>
    </div>
    <div class="searchbar">
      <input id="mi" type="text" placeholder="Ask anything, research a topic, or drop a URL…" autocomplete="off" onkeydown="if(event.key==='Enter')doMain()">
      <button class="gobtn" onclick="doMain()">→</button>
    </div>
    <div class="pills">
      <span class="pill" onclick="usePill('Build a spider map about the future of AI')">🕸 Spider map</span>
      <span class="pill" onclick="addURL()">🔗 Add URL</span>
      <span class="pill" onclick="usePill('What are the latest trends in AI tools 2025?')">✦ AI trends</span>
    </div>
  </div>

  <div id="bt">
    <button class="bb on" id="bsel" onclick="setConn(false)" title="Select">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l10 6-5 1-2 5z"/></svg>
    </button>
    <button class="bb" id="bcon" onclick="setConn(!connMode)" title="Connect">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="3.5" cy="8" r="2"/><circle cx="12.5" cy="8" r="2"/><path d="M5.5 8h5"/></svg>
    </button>
    <div class="bsep"></div>
    <button class="bb" onclick="addCard('chat',{title:'AI Chat',messages:[]})" title="Chat">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 10a2 2 0 01-2 2H5l-3 3V4a2 2 0 012-2h8a2 2 0 012 2z"/></svg>
    </button>
    <button class="bb" onclick="addCard('note',{title:'Note',text:''})" title="Note">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 6h6M5 9h4"/></svg>
    </button>
    <button class="bb" onclick="addURL()" title="Add URL">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6.5 9.5a3.5 3.5 0 005 0l2-2a3.5 3.5 0 00-5-5L7 4"/><path d="M9.5 6.5a3.5 3.5 0 00-5 0l-2 2a3.5 3.5 0 005 5L9 12"/></svg>
    </button>
    <button class="bb" onclick="addSpider()" title="Spider node">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2M4 4l1.5 1.5M10.5 10.5L12 12M12 4l-1.5 1.5M5.5 10.5L4 12"/></svg>
    </button>
    <div class="bsep"></div>
    <button class="bb" onclick="zIn()" title="Zoom in">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M10.5 10.5l3 3M5 7h4M7 5v4"/></svg>
    </button>
    <span class="zv" id="zv">100%</span>
    <button class="bb" onclick="zOut()" title="Zoom out">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M10.5 10.5l3 3M5 7h4"/></svg>
    </button>
    <button class="bb" onclick="fitV()" title="Fit view">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6V2h4M10 2h4v4M14 10v4h-4M6 14H2v-4"/></svg>
    </button>
  </div>

  <div id="hint"></div>
</div>

<div id="toast"></div>

<script>
// NO GALAXY JS - using CSS only
(function(){
  return;
  var canvas = document.getElementById('galaxy');
  var ctx = canvas.getContext('2d');
  var stars = [];
  var nebulae = [];

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    drawGalaxy();
  }

  function rand(min,max){return Math.random()*(max-min)+min;}

  function initStars(){
    stars = [];
    nebulae = [];
    var count = Math.floor((canvas.width * canvas.height) / 3000);
    for(var i=0;i<count;i++){
      var size = Math.random();
      var bright = size > 0.97;
      stars.push({
        x: rand(0, canvas.width),
        y: rand(0, canvas.height),
        r: bright ? rand(1.2,2.2) : rand(0.2,0.9),
        a: rand(0.3,1),
        twinkle: rand(0,Math.PI*2),
        twinkleSpeed: rand(0.01,0.04),
        color: bright ? (Math.random()>0.5 ? '#d4c8ff' : '#ffeedd') : '#ffffff'
      });
    }
    // nebula blobs
    for(var j=0;j<4;j++){
      nebulae.push({
        x: rand(0,canvas.width),
        y: rand(0,canvas.height),
        r: rand(150,400),
        color: ['rgba(60,20,120,','rgba(20,40,100,','rgba(80,30,80,','rgba(20,60,80,'][j]
      });
    }
  }

  function drawGalaxy(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // deep space gradient
    var grad = ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,canvas.width*0.8);
    grad.addColorStop(0,'#0d1228');
    grad.addColorStop(0.5,'#080b14');
    grad.addColorStop(1,'#04060d');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // nebulae
    nebulae.forEach(function(n){
      var g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0, n.color+'0.06)');
      g.addColorStop(0.4, n.color+'0.03)');
      g.addColorStop(1, n.color+'0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fill();
    });

    // stars
    stars.forEach(function(s){
      var twinkle = Math.sin(s.twinkle) * 0.3 + 0.7;
      ctx.globalAlpha = s.a * twinkle;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fill();

      // glow for bright stars
      if(s.r > 1.2){
        ctx.globalAlpha = s.a * twinkle * 0.15;
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r*4,0,Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    });
  }

  function animate(){
    stars.forEach(function(s){ s.twinkle += s.twinkleSpeed; });
    drawGalaxy();
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', function(){
    resize();
    initStars();
  });

  resize();
  initStars();
  animate();
})();

function uid(){return 'c'+(nid++);}
function euid(){return 'e'+Date.now().toString(36)+Math.floor(Math.random()*1000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function s2c(sx,sy){return{x:(sx-pan.x)/zoom,y:(sy-pan.y)/zoom};}
function c2s(cx,cy){return{x:cx*zoom+pan.x,y:cy*zoom+pan.y};}
function ctr(){var r=cw.getBoundingClientRect();return s2c(r.width/2,r.height/2);}
function rnd(n){return(Math.random()-.5)*(n||120);}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2500);}
function showHome(){home.classList.toggle('gone',cards.length>0);}
function applyT(){world.style.transform='translate('+pan.x+'px,'+pan.y+'px) scale('+zoom+')';world.style.transformOrigin='0 0';}
function updZ(){document.getElementById('zv').textContent=Math.round(zoom*100)+'%';}
function zIn(){zoom=Math.min(3,zoom*1.15);applyT();drawE();updZ();}
function zOut(){zoom=Math.max(.1,zoom/1.15);applyT();drawE();updZ();}
function fitV(){
  if(!cards.length){pan={x:0,y:0};zoom=1;applyT();drawE();updZ();return;}
  var xs=cards.map(function(c){return c.x;}),ys=cards.map(function(c){return c.y;});
  var pad=100,minX=Math.min.apply(null,xs)-pad,maxX=Math.max.apply(null,xs)+pad+300;
  var minY=Math.min.apply(null,ys)-pad,maxY=Math.max.apply(null,ys)+pad+180;
  var W=cw.offsetWidth,H=cw.offsetHeight;
  zoom=Math.min(W/(maxX-minX),H/(maxY-minY),1.4);
  pan.x=(W-(maxX+minX)*zoom)/2;pan.y=(H-(maxY+minY)*zoom)/2;
  applyT();drawE();updZ();
}

// DRAW EDGES
function drawE(){
  eg.innerHTML='';
  edges.forEach(function(e){
    var a=cards.find(function(c){return c.id===e.from;}),b=cards.find(function(c){return c.id===e.to;});
    if(!a||!b)return;
    var as=c2s(a.x,a.y),bs=c2s(b.x,b.y);
    var dx=bs.x-as.x,dy=bs.y-as.y,bnd=.2;
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M'+as.x+','+as.y+' C'+(as.x+dx*.3-dy*bnd)+','+(as.y+dy*.3+dx*bnd)+' '+(bs.x-dx*.3-dy*bnd)+','+(bs.y-dy*.3+dx*bnd)+' '+bs.x+','+bs.y);
    path.setAttribute('class','eline');
    path.onclick=function(){if(confirm('Remove connection?')){edges=edges.filter(function(x){return x.id!==e.id;});drawE();}};
    eg.appendChild(path);
  });
}

// MARKDOWN RENDER
function mdRender(t){
  return (t||'')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/###\s(.+)/g,'<h3>$1</h3>')
    .replace(/##\s(.+)/g,'<h3>$1</h3>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^(.)/,'<p>$1')
    .replace(/(.)$/,'$1</p>');
}

function bindDrag(el,c){
var handle=c.type===‘spider’?el:el.querySelector(’[data-id]’);
if(!handle)return;
var sx,sy,ox,oy,moved=false;
handle.addEventListener(‘pointerdown’,function(e){
if(e.target.tagName===‘BUTTON’||e.target.tagName===‘INPUT’||e.target.tagName===‘TEXTAREA’||e.target.tagName===‘A’||e.target.tagName===‘SPAN’)return;
if(connMode){doConn(c.id);return;}
e.stopPropagation();
try{handle.setPointerCapture(e.pointerId);}catch(err){}
sx=e.clientX;sy=e.clientY;ox=c.x;oy=c.y;moved=false;
});
handle.addEventListener(‘pointermove’,function(e){
if(!handle.hasPointerCapture||!handle.hasPointerCapture(e.pointerId))return;
var dx=(e.clientX-sx)/zoom,dy=(e.clientY-sy)/zoom;
if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;
if(!moved)return;
c.x=ox+dx;c.y=oy+dy;
el.style.left=c.x+‘px’;el.style.top=c.y+‘px’;
drawE();
});
handle.addEventListener(‘pointerup’,function(){
if(!moved&&c.type===‘spider’&&!connMode)selCard(c.id);
});
}

function selCard(id){

document.querySelectorAll(’.card’).forEach(function(el){el.classList.remove(‘sel’);});

}

cards.push(c);buildCard(c,true);showHome();return c;
}

// PAN + ZOOM
var panPid=null,panSX=0,panSY=0,panPX=0,panPY=0;
var pinchDist=0,pinchZ=1,pinchPX=0,pinchPY=0;

cw.addEventListener(‘pointerdown’,function(e){
var ok=e.target===cw||e.target.id===‘world’||e.target.closest&&e.target.closest(’#esvg’);
if(!ok)return;
if(connMode){setConn(false);return;}
e.preventDefault();
try{cw.setPointerCapture(e.pointerId);}catch(err){}
panPid=e.pointerId;panSX=e.clientX;panSY=e.clientY;panPX=pan.x;panPY=pan.y;
});

cw.addEventListener(‘pointermove’,function(e){
if(e.pointerId!==panPid)return;
pan.x=panPX+(e.clientX-panSX);pan.y=panPY+(e.clientY-panSY);
applyT();drawE();
});

cw.addEventListener(‘pointerup’,function(e){if(e.pointerId===panPid)panPid=null;});

cw.addEventListener(‘touchstart’,function(e){
if(e.touches.length!==2)return;
var ok=e.target===cw||e.target.id===‘world’;if(!ok)return;
pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
pinchZ=zoom;pinchPX=pan.x;pinchPY=pan.y;panPid=null;
},{passive:true});

cw.addEventListener(‘touchmove’,function(e){
if(e.touches.length!==2)return;
e.preventDefault();
var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
var f=d/pinchDist;
var mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;
var r=cw.getBoundingClientRect(),cx=mx-r.left,cy=my-r.top;
var nz=Math.min(3,Math.max(.1,pinchZ*f));
pan.x=cx-(cx-pinchPX)*(nz/pinchZ);pan.y=cy-(cy-pinchPY)*(nz/pinchZ);
zoom=nz;applyT();drawE();updZ();
},{passive:false});

cw.addEventListener(‘wheel’,function(e){
e.preventDefault();
var f=e.deltaY<0?1.07:.94;
var r=cw.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
pan.x=mx-(mx-pan.x)*f;pan.y=my-(my-pan.y)*f;
zoom=Math.min(3,Math.max(.1,zoom*f));
applyT();drawE();updZ();
},{passive:false});

try{
var hist=c.data.messages.slice(0,-1).map(function(m){return{role:m.role===‘user’?‘user’:‘assistant’,content:m.text};});

var data=await callAPI({
system:‘You are a research assistant on The Fibonacci Web — a visual thinking canvas. Help users explore, connect and expand ideas. For matrix/comparison requests respond ONLY with JSON: {“type”:“matrix”,“title”:”…”,“cols”:[“A”,“B”],“rows”:[{“label”:“Row”,“cells”:[“a”,“b”]}]} Otherwise use plain text with **bold** and ### headers. Be insightful and concise.’,
messages:hist,
max_tokens:1200
});
var raw=data.content.filter(function(b){return b.type===‘text’;}).map(function(b){return b.text;}).join(’\n’)||‘No response.’;
var th2=document.getElementById(‘th-’+c.id);if(th2)th2.remove();
var parsed=null;
try{if(raw.trim().charAt(0)===’{’)parsed=JSON.parse(raw.trim());}catch(err){}
if(parsed&&parsed.type===‘matrix’){
var nc=addCard(‘matrix’,{title:parsed.title,cols:parsed.cols,rows:parsed.rows},340,0);
edges.push({id:euid(),from:c.id,to:nc.id});drawE();
c.data.messages.push({role:‘ai’,text:’Matrix created: ’+parsed.title});
if(box){var am=document.createElement(‘div’);am.className=‘msg a’;am.textContent=’⊞ Matrix: ’+parsed.title;box.appendChild(am);box.scrollTop=box.scrollHeight;}
}else{
c.data.messages.push({role:‘ai’,text:raw});
if(box){
var am2=document.createElement(‘div’);am2.className=‘msg a’;am2.innerHTML=mdRender(raw);
box.appendChild(am2);box.scrollTop=box.scrollHeight;
}
if(raw.length>300){
var nc2=addCard(‘text’,{title:‘Research’,content:raw},320,80);
edges.push({id:euid(),from:c.id,to:nc2.id});drawE();

}
}catch(err){

c.data.messages.push({role:‘ai’,text:’Error: ’+err.message});
if(box){var am3=document.createElement(‘div’);am3.className=‘msg a’;am3.textContent=’Error: ’+err.message;box.appendChild(am3);}
}
}

try{
var data=await callAPI({
system:‘Respond ONLY with valid JSON.’,
messages:[{role:‘user’,content:‘About: ‘+c.data.url+’\nReturn ONLY: {“mainTopic”:”…”,“subtopics”:[{“label”:”…”,“ideas”:[”…”,”…”]},{“label”:”…”,“ideas”:[”…”,”…”]}]}’}],
max_tokens:800
});
var raw=data.content.filter(function(b){return b.type===‘text’;}).map(function(b){return b.text;}).join(’’).replace(/`json|`/g,’’).trim();
var parsed=JSON.parse(raw);
var main=addCard(‘spider’,{label:parsed.mainTopic||‘Topic’,role:‘main’},200,0);
edges.push({id:euid(),from:id,to:main.id});
(parsed.subtopics||[]).forEach(function(st,i){
var angle=(i/parsed.subtopics.length)*Math.PI*2-Math.PI/2;
var sub=addCard(‘spider’,{label:st.label,role:‘sub’},200+Math.cos(angle)*170,Math.sin(angle)*170);
edges.push({id:euid(),from:main.id,to:sub.id});
(st.ideas||[]).forEach(function(idea,j){
var ia=angle+((j-st.ideas.length/2+.5)*.5);
var ic=addCard(‘spider’,{label:idea,role:‘idea’},200+Math.cos(angle)*170+Math.cos(ia)*100,Math.sin(angle)*170+Math.sin(ia)*100);
edges.push({id:euid(),from:sub.id,to:ic.id});
});
});
drawE();fitV();toast(‘Done ✓’);
}catch(err){toast(’Error: ’+err.message);}
}

// SAVE/LOAD
function saveC(){var n=document.getElementById(‘cname’).value||‘Untitled’;localStorage.setItem(‘fib_’+n,JSON.stringify({cards:cards,edges:edges,nid:nid}));toast(‘Saved ✓’);}
function loadC(){
var n=document.getElementById(‘cname’).value||‘Untitled’;
var s=localStorage.getItem(‘fib_’+n);if(!s){toast(‘Nothing saved’);return;}
var d=JSON.parse(s);cards=d.cards;edges=d.edges;nid=d.nid||1;
world.innerHTML=’’;eg.innerHTML=’’;
cards.forEach(function(c){buildCard(c,false);});
drawE();showHome();fitV();toast(‘Loaded ✓’);
}
function newC(){if(cards.length&&!confirm(‘New canvas?’))return;cards=[];edges=[];world.innerHTML=’’;eg.innerHTML=’’;showHome();toast(‘New canvas’);}

document.addEventListener(‘keydown’,function(e){
if(e.key===‘Escape’)setConn(false);
if((e.key===‘Delete’||e.key===‘Backspace’)&&selId&&document.activeElement.tagName!==‘INPUT’&&document.activeElement.tagName!==‘TEXTAREA’){delCard(selId);selId=null;}
});

applyT();
</script>
